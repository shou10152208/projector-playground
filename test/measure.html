<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>measure</title>
<style>html,body{margin:0}iframe{border:0;width:100vw;height:100vh}#out{position:fixed;z-index:99;font:14px monospace;color:#000;background:#fff}</style>
</head>
<body>
<pre id="out">measuring…</pre>
<iframe id="f" src="../index.html"></iframe>
<script>
const f = document.getElementById('f');
f.addEventListener('load', () => {
  setTimeout(() => {
    const w = f.contentWindow;
    const d = f.contentDocument;
    const card = d.querySelector('.card');
    const r = card.getBoundingClientRect();
    const cs = w.getComputedStyle(card);
    const o = {
      innerWidth: w.innerWidth,
      cardLeft: Math.round(r.left), cardRight: Math.round(r.right), cardWidth: Math.round(r.width),
      maxWidth: cs.maxWidth, padding: cs.padding, margin: cs.margin,
      overflowRight: Math.round(r.right - w.innerWidth),
    };
    const txt = JSON.stringify(o, null, 2);
    document.getElementById('out').textContent = txt;
    document.title = 'MEASURE ' + JSON.stringify(o);
  }, 300);
});
</script>
</body>
</html>
